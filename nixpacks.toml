[providers]
python = true
node = true

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
    "python3 -m pip install -r requirements.txt",
    "npm install",
    "cd frontend && npm install",
    "cd backend && npm install"
]

[phases.build]
cmds = [
    "npm run build:frontend"
]

[start]
cmd = "npm run dev:backend"
